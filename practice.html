<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="app"></div>
    <script src="./el.js"></script>
    <script>
        const list = [
            { name: '张三', age: 18 },
            { name: '李四', age: 20 },
            { name: '王五', age: 22 }
        ];

        const connectorLink = {};

        const listHtml = el('ul').link(connectorLink, 'list').child(
            list.map(item => el('li').text(`${item.name} - ${item.age}`))
        );

        const container = el('div').child([
            el('button').text('clear list').on('click', () => {
                let thisListHtml = connectorLink.list;
                // load as el object
                el(thisListHtml).clear();
            }),
        ]);

        const app = document.getElementById('app');

        app.appendChild(container.get());

        setTimeout(() => {
            container.child(listHtml).get();
        }, 10);

    </script>
</body>
</html>
